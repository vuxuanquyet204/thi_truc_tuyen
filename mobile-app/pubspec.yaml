name: academic_luminary
description: "Academic Luminary - Intelligent Examination Platform with AI Proctoring and LearnToken System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Fonts
  google_fonts: ^6.1.0

  # Navigation
  go_router: ^14.8.1

  # HTTP & API
  dio: ^5.8.0+1

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # State Management
  provider: ^6.1.4

  # Charts
  fl_chart: ^0.70.2

  # UI Utilities
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/placeholders/
