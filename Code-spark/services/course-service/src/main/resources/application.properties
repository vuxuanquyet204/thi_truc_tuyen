# ------------------- SERVER -------------------
server.port=9001
# Remove context-path as we're handling it in the controller
server.servlet.context-path=/
spring.application.name=course-service

# ------------------- DATABASE -------------------
# Sử dụng biến môi trường nếu có, nếu không dùng giá trị default
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/course_db?sslmode=disable}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=10


management.endpoint.prometheus.enabled=true

# ------------------- JPA -------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ------------------- JMX -------------------
spring.jmx.enabled=false

# ------------------- EUREKA CLIENT -------------------
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:9999/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}

# URL của API Gateway cho WebClient
app.services.api-gateway.url=${API_GATEWAY_BASE_URL:http://localhost:8080}

# ------------------- ACTUATOR -------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# ------------------- LOGGING -------------------
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO
logging.level.com.dao.courseservice=DEBUG

# ------------------- JWT -------------------
app.jwt.secret=${JWT_SECRET:mySecretKey12345678901234567890123456789012345678901234567890}

# ------------------- API GATEWAY -------------------

# ------------------- MULTIPART UPLOAD -------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
# For large request bodies on embedded Tomcat
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-post-size=-1

# ------------------- MINIO / S3 -------------------
cloud.aws.s3.url=${S3_URL:http://localhost:9100}
cloud.aws.s3.access-key=${S3_ACCESS_KEY:admin}
cloud.aws.s3.secret-key=${S3_SECRET_KEY:12345678}
cloud.aws.s3.bucket-name=${S3_BUCKET:videos}
cloud.aws.s3.region=${S3_REGION:us-east-1}

# ------------------- REDIS CACHE -------------------
#spring.data.redis.host=${REDIS_HOST}
#spring.data.redis.port=${REDIS_PORT}
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=5000ms
spring.cache.cache-names=courses,courseDetails,popularCourses

# ------------------- EXAM SERVICE -------------------
app.services.exam-service.url=${EXAM_SERVICE_URL:http://localhost:9005}

# Feign timeout — search questions có thể chậm với lượng lớn câu hỏi
feign.client.config.exam-service.connectTimeout=10000
feign.client.config.exam-service.readTimeout=60000

# ------------------- IDENTITY SERVICE -------------------
app.services.identity-service.url=${IDENTITY_SERVICE_URL:http://localhost:9002}


