# Application Configuration
spring.application.name=exam-service
server.port=9005

app.jwt.secret=${JWT_SECRET:mySecretKey12345678901234567890123456789012345678901234567890}

# xóa cấu hình mongodb
# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/exam_db}

# PostgreSQL Database Connection Settings
# Use the service name 'postgres-db' instead of 'localhost' for Docker networking
# Using course_db instead of exam_db to share database with online_service
spring.datasource.url=jdbc:postgresql://localhost:5433/exam_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Settings
# update: tự động thêm cột mới khi chạy, KHÔNG xóa cột cũ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Tự động chạy import.sql sau khi khởi tạo schema (nếu có)
spring.jpa.defer-datasource-initialization=false

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# Eureka Client Configuration
# Use the service name 'discovery-service' instead of 'localhost' for Docker networking
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:9999/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}

# Management Endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Logging
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO
logging.level.com.dao.examservice=DEBUG

# Database schema migration (run on startup)
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# Disable JMX to avoid port conflicts
spring.jmx.enabled=false

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=exam-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Spring AI Configuration (OpenRouter - compatible with OpenAI API)
# Leave empty to disable AI essay scoring; set your OpenRouter API key to enable it
# Get your key at: https://openrouter.ai/keys
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.api-key=${OPENROUTER_API_KEY:}

# Feign Client Configuration for calling other services
app.services.course-service.url=${COURSE_SERVICE_URL:http://localhost:8082}
app.services.notification-service.url=${NOTIFICATION_SERVICE_URL:http://localhost:9007}
