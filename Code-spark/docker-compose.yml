services:
  # 1. Dịch vụ giám sát Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - microservice-net

  # 2. Dịch vụ trực quan hóa Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - microservice-net

  # 3. Cơ sở dữ liệu
  postgres-db:
    # Đã đổi từ 'latest' sang '17' để tránh xung đột cấu trúc dữ liệu bản 18
    image: postgres:17
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: "Asia/Ho_Chi_Minh"
      PGTZ: "Asia/Ho_Chi_Minh"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      # Giữ nguyên đường dẫn này vì nó tương thích với bản 17 trở xuống
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - microservice-net

  mongo-db:
    # Cố định phiên bản MongoDB (Ví dụ bản 7) để đảm bảo ổn định
    image: mongo:7
    container_name: mongo-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - microservice-net

  redis:
    # Cố định phiên bản Redis (Ví dụ bản 7)
    image: redis:7
    container_name: redis
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - microservice-net

  # 4. Ganache local blockchain
  ganache:
    image: trufflesuite/ganache-cli:latest
    container_name: ganache
    ports:
      - "7545:7545"
    volumes:
      - ganache_data:/ganache/data
    command: >
      --db /ganache/data 
      --host 0.0.0.0 
      --port 7545 
      -m "${GANACHE_MNEMONIC}" 
      --networkId 5777
    networks:
      microservice-net:
        aliases:
          - ganache-cli

  # 5. Apache Kafka message broker
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_NODE_ID: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENERS: 'PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservice-net

  # 6. Eureka Server - Service Discovery
  eureka-server:
    image: springcloud/eureka:latest
    container_name: eureka-server
    environment:
      SPRING_APPLICATION_NAME: eureka-server
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: false
      EUREKA_CLIENT_FETCH_FROM_EUREKA: false
      EUREKA_SERVER_ENABLE_SELF_PRESERVATION: false
    ports:
      - "9999:9999"
    networks:
      - microservice-net

# Khai báo mạng chung cho các container
networks:
  microservice-net:
    driver: bridge

# Khai báo volume để lưu trữ dữ liệu
volumes:
  grafana-data:
  postgres_data:
  mongo_data:
  redis_data:
  ganache_data: 
  copyright_uploads: